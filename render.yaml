# Render blueprint — deploys the UniScout backend as a free web service.
# After deploy, set the secret env vars in the Render dashboard (marked sync:false),
# then add a free daily trigger (see server/DEPLOY-DIGEST.md).
services:
  - type: web
    name: uniscout
    runtime: docker
    dockerfilePath: ./server/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 4242
      - key: DIGEST_HOUR
        value: 8
      # ── REQUIRED to boot: the server exits on start without STRIPE_SECRET_KEY ──
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # Public URL of this Render service (used for Stripe redirect URLs).
      - key: APP_URL
        sync: false
      # Accounts that are always Elite (comma-separated emails/usernames). Add your
      # account here so you receive the Elite digest without a Stripe subscription.
      - key: ELITE_ACCOUNTS
        sync: false
      # ── secrets: set these in the Render dashboard ──
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: DIGEST_CRON_TOKEN
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
