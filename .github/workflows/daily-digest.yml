name: Daily university digest

# Pings the DEPLOYED server once a day. The server holds the live list of Elite
# subscribers (each with their own saved universities) and sends every one of
# them a personalised email. Can also be triggered by hand from the Actions tab.
#
# Why a ping (not `node digest-cron.js`)? That script runs against a fresh, empty
# database and only knows the static digest-targets.json — it cannot reach your
# real Elite users. Only the deployed server has that data.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   DIGEST_CRON_URL    e.g. https://uniscout.onrender.com/api/digest/cron
#   DIGEST_CRON_TOKEN  the value Render generated for DIGEST_CRON_TOKEN
on:
  schedule:
    # 09:00 UTC = 11:00 in Madrid (summer/CEST). In winter it lands at 10:00 local.
    # NOTE: GitHub cron is UTC only and scheduled runs can be delayed 5–30 min.
    - cron: "0 9 * * *"
  workflow_dispatch: {}

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger the digest on the server
        env:
          DIGEST_CRON_URL: ${{ secrets.DIGEST_CRON_URL }}
          DIGEST_CRON_TOKEN: ${{ secrets.DIGEST_CRON_TOKEN }}
        run: |
          if [ -z "$DIGEST_CRON_URL" ] || [ -z "$DIGEST_CRON_TOKEN" ]; then
            echo "::error::Set DIGEST_CRON_URL and DIGEST_CRON_TOKEN repo secrets."
            exit 1
          fi
          # --max-time generous so a sleeping free host has time to wake. The
          # server replies immediately (202-style) and sends in the background.
          curl -fsS --max-time 120 "${DIGEST_CRON_URL}?token=${DIGEST_CRON_TOKEN}"
          echo
          echo "Digest triggered."
