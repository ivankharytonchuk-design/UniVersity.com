name: Daily university digest

# Runs every day at 09:00 UTC, and can also be triggered by hand from the
# Actions tab (workflow_dispatch → "Run workflow"). It sends the news email
# about the universities listed in server/digest-targets.json.
on:
  schedule:
    # 09:00 UTC = 11:00 in Madrid (summer/CEST). In winter it lands at 10:00 local.
    # NOTE: GitHub cron is UTC only and scheduled runs can be delayed 5–30 min.
    - cron: "0 9 * * *"
  workflow_dispatch: {}

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install server deps
        run: cd server && npm install --omit=dev
      - name: Send the digest
        run: cd server && node digest-cron.js
        env:
          # Preferred provider: Resend. Set RESEND_API_KEY in repo Settings →
          # Secrets and variables → Actions. Without it, NOTHING is sent.
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM || 'UniScout <onboarding@resend.dev>' }}
          # Fallback provider: SMTP (e.g. a Gmail app password). Used only if
          # RESEND_API_KEY is absent. Safe to leave these secrets unset.
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
